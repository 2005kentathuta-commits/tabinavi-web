<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>開発者ダッシュボード | 足袋navi</title>
    <style>
      :root {
        --bg: #1f130d;
        --panel: rgba(255, 248, 236, 0.94);
        --line: #dbc3a1;
        --text: #332418;
        --sub: #5f4a3a;
        --accent: #a36236;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        color: var(--text);
        background:
          linear-gradient(rgba(19, 12, 8, 0.65), rgba(19, 12, 8, 0.7)),
          url('/site-bg.jpg') center / cover fixed no-repeat;
      }

      .wrap {
        width: min(980px, calc(100% - 32px));
        margin: 26px auto;
        display: grid;
        gap: 12px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
      }

      h1,
      h2 {
        margin: 0 0 10px;
        font-weight: 700;
      }

      p {
        margin: 0;
        color: var(--sub);
      }

      .row {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 4px;
        font-size: 0.9rem;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
        background: #fffdf8;
        color: var(--text);
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        color: #fff9f0;
        background: linear-gradient(125deg, #8a5631, #b87440);
      }

      button.secondary {
        color: #4e3727;
        background: linear-gradient(125deg, #f5ebdb, #e9d8bf);
        border: 1px solid var(--line);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fdf6ea;
        color: #4b3728;
      }

      .status.error {
        border-color: #d49f9f;
        background: #fff0ef;
        color: #6b2522;
      }

      .subpanel {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }

      .hidden {
        display: none;
      }

      .head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 8px 6px;
        font-size: 0.92rem;
      }

      th {
        color: #5c4332;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .metric-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fffaf1;
      }

      .metric-label {
        margin: 0;
        color: #6a4f3d;
        font-size: 0.8rem;
      }

      .metric-value {
        margin: 4px 0 0;
        font-size: 1.18rem;
        font-weight: 700;
        color: #372619;
      }

      @media (max-width: 900px) {
        .metrics-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>開発者ダッシュボード</h1>
        <p>オーナー専用です。登録状況と運営メトリクスを確認できます。</p>
      </section>

      <section id="loginPanel" class="panel">
        <h2>開発者ログイン</h2>
        <form id="loginForm" class="row">
          <label>
            メールアドレス
            <input id="email" type="email" required placeholder="you@example.com" autocomplete="email" />
          </label>
          <label>
            パスワード
            <input id="password" type="password" required placeholder="8文字以上（例: kkkkkkkk）" autocomplete="current-password" />
          </label>
          <button type="submit">ログイン</button>
        </form>
        <p id="loginStatus" class="status hidden"></p>

        <div class="subpanel">
          <h2 style="font-size: 1.05rem;">ログインできないとき</h2>
          <p style="margin-bottom:8px;">このページから開発者アカウントの新規作成はできません。パスワード再設定のみ対応します。</p>

          <form id="resetRequestForm" class="row" style="margin-top:10px;">
            <label>
              再設定メールの送信先
              <input id="resetEmail" type="email" placeholder="you@example.com" autocomplete="email" />
            </label>
            <button type="submit" class="secondary">再設定メールを送信</button>
          </form>
          <p id="resetRequestStatus" class="status hidden"></p>

          <form id="resetConfirmForm" class="row" style="margin-top:10px;">
            <label>
              再設定コード
              <input id="resetToken" type="text" placeholder="発行されたコード" />
            </label>
            <label>
              新しいパスワード
              <input id="resetPassword" type="password" minlength="8" placeholder="8文字以上（例: kkkkkkkk）" />
            </label>
            <label>
              新しいパスワード（確認）
              <input id="resetPasswordConfirm" type="password" minlength="8" placeholder="確認入力" />
            </label>
            <button type="submit">パスワードを更新</button>
          </form>
          <p id="resetConfirmStatus" class="status hidden"></p>
        </div>
      </section>

      <section id="appPanel" class="panel hidden">
        <div class="head">
          <h2>登録メール一覧</h2>
          <button id="logoutBtn" class="secondary" type="button">ログアウト</button>
        </div>

        <div class="head" style="margin-top:12px;">
          <h2>運営メトリクス</h2>
          <button id="refreshMetricsBtn" class="secondary" type="button">指標を更新</button>
        </div>
        <p id="metricsStatus" class="status hidden"></p>
        <div class="metrics-grid">
          <article class="metric-card">
            <p class="metric-label">総ユーザー数</p>
            <p id="metricUsers" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">登録ユーザー</p>
            <p id="metricRegisteredUsers" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">ゲストユーザー</p>
            <p id="metricGuestUsers" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">旅行数</p>
            <p id="metricTrips" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">24hアクティブ</p>
            <p id="metricActive24h" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">7日アクティブ</p>
            <p id="metricActive7d" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">7日新規ユーザー</p>
            <p id="metricNewUsers7d" class="metric-value">-</p>
          </article>
          <article class="metric-card">
            <p class="metric-label">7日新規旅行</p>
            <p id="metricNewTrips7d" class="metric-value">-</p>
          </article>
        </div>

        <div class="head" style="margin-top:16px;">
          <h2>人気の目的地</h2>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>目的地</th>
              <th>旅行数</th>
            </tr>
          </thead>
          <tbody id="destinationRows"></tbody>
        </table>

        <form id="checkForm" class="row" style="margin-top: 12px;">
          <label>
            1件だけ登録状況を確認
            <input id="checkEmail" type="email" placeholder="check@example.com" required />
          </label>
          <button type="submit" class="secondary">確認</button>
        </form>
        <p id="checkStatus" class="status hidden"></p>

        <p id="tableStatus" class="status hidden"></p>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>表示名</th>
              <th>メールアドレス</th>
              <th>登録日時</th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>

        <div class="head" style="margin-top:16px;">
          <h2>ログイン履歴</h2>
          <button id="refreshEventsBtn" class="secondary" type="button">履歴を更新</button>
        </div>
        <p id="eventsStatus" class="status hidden"></p>
        <table>
          <thead>
            <tr>
              <th>日時</th>
              <th>結果</th>
              <th>メール</th>
              <th>表示名</th>
              <th>IP</th>
              <th>理由</th>
            </tr>
          </thead>
          <tbody id="eventRows"></tbody>
        </table>
      </section>
    </main>

    <script>
      const TOKEN_KEY = 'tabinoshiori_admin_token_v1';
      const APP_SESSION_KEY = 'tabinoshiori_session_v1';

      const loginPanel = document.getElementById('loginPanel');
      const appPanel = document.getElementById('appPanel');
      const loginForm = document.getElementById('loginForm');
      const checkForm = document.getElementById('checkForm');
      const logoutBtn = document.getElementById('logoutBtn');
      const refreshEventsBtn = document.getElementById('refreshEventsBtn');
      const refreshMetricsBtn = document.getElementById('refreshMetricsBtn');
      const loginStatus = document.getElementById('loginStatus');
      const resetRequestForm = document.getElementById('resetRequestForm');
      const resetConfirmForm = document.getElementById('resetConfirmForm');
      const resetRequestStatus = document.getElementById('resetRequestStatus');
      const resetConfirmStatus = document.getElementById('resetConfirmStatus');
      const metricsStatus = document.getElementById('metricsStatus');
      const checkStatus = document.getElementById('checkStatus');
      const tableStatus = document.getElementById('tableStatus');
      const eventsStatus = document.getElementById('eventsStatus');
      const userRows = document.getElementById('userRows');
      const eventRows = document.getElementById('eventRows');
      const destinationRows = document.getElementById('destinationRows');
      let publicConfig = null;

      function showStatus(el, text, isError) {
        if (!text) {
          el.classList.add('hidden');
          el.textContent = '';
          return;
        }
        el.classList.remove('hidden');
        el.textContent = text;
        el.classList.toggle('error', Boolean(isError));
      }

      function setLoggedInMode(isLoggedIn) {
        loginPanel.classList.toggle('hidden', isLoggedIn);
        appPanel.classList.toggle('hidden', !isLoggedIn);
      }

      function getToken() {
        return window.sessionStorage.getItem(TOKEN_KEY) || '';
      }

      function setToken(token) {
        if (!token) {
          window.sessionStorage.removeItem(TOKEN_KEY);
          return;
        }
        window.sessionStorage.setItem(TOKEN_KEY, token);
      }

      function readMainSessionToken() {
        try {
          const raw = window.localStorage.getItem(APP_SESSION_KEY);
          if (!raw) {
            return '';
          }
          const parsed = JSON.parse(raw);
          return String(parsed?.access_token || '');
        } catch {
          return '';
        }
      }

      async function request(path, options = {}, token = '') {
        const response = await fetch(path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
            ...(token ? { Authorization: `Bearer ${token}` } : {}),
          },
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || '通信に失敗しました。');
        }
        return payload;
      }

      const escapeHtml = (value) =>
        String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#039;');

      function trackEvent(eventName, properties = {}) {
        if (window.posthog && typeof window.posthog.capture === 'function') {
          window.posthog.capture(eventName, properties);
        }
      }

      async function initPosthog() {
        try {
          publicConfig = await request('/api/public-config', { method: 'GET' });
          const posthogKey = publicConfig?.posthog?.key || '';
          const posthogHost = publicConfig?.posthog?.host || 'https://us.i.posthog.com';
          if (!posthogKey) {
            return;
          }

          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/posthog-js@1/dist/posthog.js';
            script.async = true;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });

          if (!window.posthog || typeof window.posthog.init !== 'function') {
            return;
          }

          window.posthog.init(posthogKey, {
            api_host: posthogHost,
            person_profiles: 'identified_only',
            capture_pageview: true,
          });
          trackEvent('developer_dashboard_open', {
            auth_provider: publicConfig?.authProvider || 'legacy',
          });
        } catch (error) {
          console.warn('PostHog initialization failed', error);
        }
      }

      async function loadRegisteredEmails() {
        const token = getToken();
        const payload = await request('/api/admin/registered-emails', { method: 'GET' }, token);
        const users = Array.isArray(payload.users) ? payload.users : [];

        userRows.innerHTML = users
          .map((user, index) => {
            const createdAt = user.createdAt ? new Date(user.createdAt).toLocaleString('ja-JP') : '-';
            return `
              <tr>
                <td>${index + 1}</td>
                <td>${escapeHtml(user.displayName || '-')}</td>
                <td>${escapeHtml(user.email || '-')}</td>
                <td>${escapeHtml(createdAt)}</td>
              </tr>
            `;
          })
          .join('');

        showStatus(tableStatus, `登録ユーザー数: ${payload.total || users.length}`, false);
      }

      function updateMetric(id, value) {
        const node = document.getElementById(id);
        if (!node) {
          return;
        }
        const asNumber = Number(value);
        node.textContent = Number.isFinite(asNumber) ? asNumber.toLocaleString('ja-JP') : String(value || '-');
      }

      async function loadMetrics() {
        const token = getToken();
        const payload = await request('/api/admin/metrics', { method: 'GET' }, token);
        const totals = payload?.totals || {};
        const activity = payload?.activity || {};
        const destinations = Array.isArray(payload?.topDestinations) ? payload.topDestinations : [];

        updateMetric('metricUsers', totals.users || 0);
        updateMetric('metricRegisteredUsers', totals.registeredUsers || 0);
        updateMetric('metricGuestUsers', totals.guestUsers || 0);
        updateMetric('metricTrips', totals.trips || 0);
        updateMetric('metricActive24h', activity.activeUsers24h || 0);
        updateMetric('metricActive7d', activity.activeUsers7d || 0);
        updateMetric('metricNewUsers7d', activity.newUsers7d || 0);
        updateMetric('metricNewTrips7d', activity.createdTrips7d || 0);

        destinationRows.innerHTML = destinations.length
          ? destinations
              .map(
                (entry, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${escapeHtml(entry.destination || '未設定')}</td>
                <td>${escapeHtml(entry.count || 0)}</td>
              </tr>
            `,
              )
              .join('')
          : '<tr><td colspan="3">データがまだありません。</td></tr>';

        const generatedAt = payload?.generatedAt
          ? new Date(payload.generatedAt).toLocaleString('ja-JP')
          : '不明';
        const ownerStatus = payload?.ownerOnly ? 'オーナー専用: ON' : 'オーナー専用: OFF';
        showStatus(metricsStatus, `${ownerStatus} / 更新: ${generatedAt}`, false);
      }

      async function loadAuthEvents() {
        const token = getToken();
        const payload = await request('/api/admin/auth-events?limit=150', { method: 'GET' }, token);
        const events = Array.isArray(payload.events) ? payload.events : [];

        eventRows.innerHTML = events
          .map((entry) => {
            const at = entry.at ? new Date(entry.at).toLocaleString('ja-JP') : '-';
            const result = entry.success ? '成功' : '失敗';
            return `
              <tr>
                <td>${escapeHtml(at)}</td>
                <td>${escapeHtml(result)}</td>
                <td>${escapeHtml(entry.email || '-')}</td>
                <td>${escapeHtml(entry.displayName || '-')}</td>
                <td>${escapeHtml(entry.ip || '-')}</td>
                <td>${escapeHtml(entry.reason || '-')}</td>
              </tr>
            `;
          })
          .join('');

        showStatus(eventsStatus, `履歴件数: ${events.length} / 全体: ${payload.total || events.length}`, false);
      }

      async function activateAdminSession(token, options = {}) {
        if (!token) {
          throw new Error('ログイントークンがありません。');
        }
        setToken(token);
        await Promise.all([loadMetrics(), loadRegisteredEmails(), loadAuthEvents()]);
        setLoggedInMode(true);
        showStatus(loginStatus, options.loginStatusText || '', false);
      }

      async function tryAdoptMainSession() {
        const appToken = readMainSessionToken();
        if (!appToken) {
          return false;
        }

        try {
          await activateAdminSession(appToken, {
            loginStatusText: 'メインサイトのログイン状態を使って開発者ダッシュボードへ入りました。',
          });
          trackEvent('developer_session_adopted');
          return true;
        } catch {
          return false;
        }
      }

      async function bootstrap() {
        await initPosthog();
        const token = getToken();
        if (token) {
          try {
            await activateAdminSession(token);
            trackEvent('developer_session_restored');
            return;
          } catch {
            setToken('');
          }
        }

        const adopted = await tryAdoptMainSession();
        if (!adopted) {
          setLoggedInMode(false);
        }
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        showStatus(loginStatus, '', false);

        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        try {
          const payload = await request('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });

          const session = payload?.data?.session;
          if (!session?.access_token) {
            throw new Error('セッション取得に失敗しました。');
          }

          await activateAdminSession(session.access_token);
          if (window.posthog && typeof window.posthog.identify === 'function') {
            window.posthog.identify(email, {
              role: 'developer',
              page: 'developer-dashboard',
            });
          }
          trackEvent('developer_login_success');
        } catch (error) {
          setToken('');
          const rawMessage = error.message || 'ログインに失敗しました。';
          const lowered = rawMessage.toLowerCase();
          const guidance =
            lowered.includes('メールまたはパスワードが正しくありません')
              ? ' パスワードを忘れた場合は下の「再設定メールを送信」から復旧できます。'
              : lowered.includes('開発者権限')
                ? ' 開発者権限のあるメールでログインしてください。'
                : '';
          showStatus(loginStatus, `${rawMessage}${guidance}`, true);
          trackEvent('developer_login_failed', {
            reason: error?.message || 'unknown',
          });
        }
      });

      resetRequestForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        showStatus(resetRequestStatus, '', false);
        showStatus(resetConfirmStatus, '', false);

        const resetEmailInput = document.getElementById('resetEmail');
        const loginEmail = document.getElementById('email').value.trim();
        const email = (resetEmailInput?.value || loginEmail).trim().toLowerCase();
        if (!email) {
          showStatus(resetRequestStatus, 'メールアドレスを入力してください。', true);
          return;
        }

        try {
          const payload = await request('/api/auth/password/request', {
            method: 'POST',
            body: JSON.stringify({
              email,
            }),
          });

          const delivery = String(payload?.delivery || '');
          const token = String(payload?.resetToken || '');
          if (delivery === 'manual-code' && token) {
            document.getElementById('resetToken').value = token;
            showStatus(
              resetRequestStatus,
              'メール送信に失敗したため、再設定コードを表示しました。下の欄に自動入力済みです。',
              false,
            );
          } else {
            showStatus(
              resetRequestStatus,
              payload?.message ||
                '登録済みメールの場合は再設定メールを送信しました。迷惑メールフォルダも確認してください。',
              false,
            );
          }
          trackEvent('developer_password_reset_requested', { delivery: delivery || 'unknown' });
        } catch (error) {
          showStatus(resetRequestStatus, error?.message || '再設定コードの発行に失敗しました。', true);
          trackEvent('developer_password_reset_request_failed');
        }
      });

      resetConfirmForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        showStatus(resetConfirmStatus, '', false);

        const token = document.getElementById('resetToken').value.trim();
        const newPassword = document.getElementById('resetPassword').value;
        const confirm = document.getElementById('resetPasswordConfirm').value;
        const email = document.getElementById('email').value.trim().toLowerCase();

        if (!token) {
          showStatus(resetConfirmStatus, '再設定コードを入力してください。', true);
          return;
        }
        if (!email) {
          showStatus(resetConfirmStatus, 'ログインメールアドレスを入力してください。', true);
          return;
        }
        if (newPassword.length < 8) {
          showStatus(resetConfirmStatus, '新しいパスワードは8文字以上で入力してください。', true);
          return;
        }
        if (newPassword !== confirm) {
          showStatus(resetConfirmStatus, '確認用パスワードが一致しません。', true);
          return;
        }

        try {
          const resetPayload = await request('/api/auth/password/reset', {
            method: 'POST',
            body: JSON.stringify({
              token,
              newPassword,
            }),
          });

          const loginPayload = await request('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              email,
              password: newPassword,
              passwordSyncToken: String(resetPayload?.passwordSyncToken || ''),
            }),
          });
          const session = loginPayload?.data?.session;
          if (!session?.access_token) {
            throw new Error('パスワードは更新されましたが、自動ログインに失敗しました。');
          }

          await activateAdminSession(session.access_token);
          document.getElementById('password').value = '';
          showStatus(resetConfirmStatus, 'パスワードを更新してログインしました。', false);
          trackEvent('developer_password_reset_success');
        } catch (error) {
          showStatus(resetConfirmStatus, error?.message || 'パスワード更新に失敗しました。', true);
          trackEvent('developer_password_reset_failed');
        }
      });

      refreshEventsBtn.addEventListener('click', async () => {
        try {
          await loadAuthEvents();
          trackEvent('developer_auth_events_refresh');
        } catch (error) {
          showStatus(eventsStatus, error.message || '履歴の取得に失敗しました。', true);
        }
      });

      refreshMetricsBtn.addEventListener('click', async () => {
        try {
          await loadMetrics();
          trackEvent('developer_metrics_refresh');
        } catch (error) {
          showStatus(metricsStatus, error.message || 'メトリクス取得に失敗しました。', true);
        }
      });

      checkForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        showStatus(checkStatus, '', false);

        try {
          const email = document.getElementById('checkEmail').value.trim();
          const token = getToken();
          const payload = await request(
            '/api/admin/email-status',
            {
              method: 'POST',
              body: JSON.stringify({ email }),
            },
            token,
          );

          if (payload.exists) {
            const createdAt = payload.createdAt ? new Date(payload.createdAt).toLocaleString('ja-JP') : '不明';
            showStatus(checkStatus, `登録済み: はい（作成日 ${createdAt}）`, false);
          } else {
            showStatus(checkStatus, '登録済み: いいえ', false);
          }
          trackEvent('developer_email_check', { exists: Boolean(payload.exists) });
        } catch (error) {
          showStatus(checkStatus, error.message || '確認に失敗しました。', true);
          trackEvent('developer_email_check_failed');
        }
      });

      logoutBtn.addEventListener('click', () => {
        setToken('');
        setLoggedInMode(false);
        destinationRows.innerHTML = '';
        userRows.innerHTML = '';
        eventRows.innerHTML = '';
        updateMetric('metricUsers', '-');
        updateMetric('metricRegisteredUsers', '-');
        updateMetric('metricGuestUsers', '-');
        updateMetric('metricTrips', '-');
        updateMetric('metricActive24h', '-');
        updateMetric('metricActive7d', '-');
        updateMetric('metricNewUsers7d', '-');
        updateMetric('metricNewTrips7d', '-');
        showStatus(metricsStatus, '', false);
        showStatus(tableStatus, '', false);
        showStatus(eventsStatus, '', false);
        if (window.posthog && typeof window.posthog.reset === 'function') {
          window.posthog.reset();
        }
        trackEvent('developer_logout');
      });

      bootstrap();
    </script>
  </body>
</html>
